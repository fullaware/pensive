# Pensive Agentic Memory System Docker Compose Configuration

services:
  pensive-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - LLM_URI=${LLM_URI:-http://localhost:8080}
      - LLM_EMBEDDING_URI=${LLM_EMBEDDING_URI:-http://localhost:1234/v1}
      - LLM_MODEL=${LLM_MODEL:-default-model}
      - LLM_EMBEDDING_MODEL=${LLM_EMBEDDING_MODEL:-default-embedding}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
      - SHORT_TERM_MEMORY_SIZE=${SHORT_TERM_MEMORY_SIZE:-10}
      - EPISODIC_MEMORY_LIMIT=${EPISODIC_MEMORY_LIMIT:-100}
      - VECTOR_SEARCH_LIMIT=${VECTOR_SEARCH_LIMIT:-5}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_UPDATE_METHOD=${TELEGRAM_UPDATE_METHOD:-polling}
      - SEARXNG_URI=${SEARXNG_URI:-http://zen.home.fullaware.com:8383}
      - PENSEIVE_MODE=api
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: >
      bash -c "python main.py"

  pensive-telegram:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - LLM_URI=${LLM_URI:-http://localhost:8080}
      - LLM_EMBEDDING_URI=${LLM_EMBEDDING_URI:-http://localhost:1234/v1}
      - LLM_MODEL=${LLM_MODEL:-default-model}
      - LLM_EMBEDDING_MODEL=${LLM_EMBEDDING_MODEL:-default-embedding}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
      - SHORT_TERM_MEMORY_SIZE=${SHORT_TERM_MEMORY_SIZE:-10}
      - EPISODIC_MEMORY_LIMIT=${EPISODIC_MEMORY_LIMIT:-100}
      - VECTOR_SEARCH_LIMIT=${VECTOR_SEARCH_LIMIT:-5}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS:-}
      - TELEGRAM_BOT_OWNER_ID=${TELEGRAM_BOT_OWNER_ID:-}
      - TELEGRAM_UPDATE_METHOD=${TELEGRAM_UPDATE_METHOD:-polling}
      - PENSIVE_API_URL=http://pensive-api:8000
      - PENSEIVE_MODE=api
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - pensive-api
    command: >
      python start_telegram.py
